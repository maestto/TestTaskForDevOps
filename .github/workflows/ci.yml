name: CI

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: ./front
            dockerfile: ./front/Dockerfile
          - name: backend
            context: ./api
            dockerfile: ./api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${REPO}-${{ matrix.name }}" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ env.SHORT_SHA }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_HOST != ''
    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.DEPLOY_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} \
            "cd ${{ vars.DEPLOY_PATH }} && docker compose pull && docker compose up -d"
          rm -f /tmp/deploy_key

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          STATUS: ${{ needs.build.result }}
        run: |
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            TEXT="Build passed"
          else
            ICON="❌"
            TEXT="Build failed"
          fi
          MESSAGE="${ICON} ${TEXT}%0A%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${GITHUB_SHA::7}%0A%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MESSAGE}" || true
